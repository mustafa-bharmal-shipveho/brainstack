name: recall — update baseline + README quality section

# What this does, in plain language:
#
# After a PR merges to main and recall/ or its tests changed, re-run the bench
# at multiple scales (80, 1000, 5000), update the baseline JSON, regenerate
# the "Retrieval quality" section in the top-level README, and commit + push
# the updates back to main.
#
# This means the README always shows the *current measured* quality numbers
# without anyone manually editing them. PRs flow through the gate workflow
# (which compares to baseline); merges to main refresh the baseline.
#
# Skipped if no recall code changed (gate workflow already proved nothing
# regressed at scale 80; rerunning a 5-minute scale-5000 bench every push
# would burn CI credits for nothing).

on:
  push:
    branches: [main]
    paths:
      - 'recall/**'
      - 'tests/recall/**'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install package + extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,embeddings,mcp]'

      - name: Run bench at scales 80, 1000, 5000
        env:
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: |
          mkdir -p /tmp/bench
          python tests/recall/bench_e2e.py --scale 80   --report --json /tmp/bench/80.json   > /tmp/bench/80.txt
          python tests/recall/bench_e2e.py --scale 1000 --report --json /tmp/bench/1000.json > /tmp/bench/1000.txt
          python tests/recall/bench_e2e.py --scale 5000 --report --json /tmp/bench/5000.json > /tmp/bench/5000.txt

      - name: Refresh baseline (scale 80) and README quality section
        run: |
          cp /tmp/bench/80.json tests/recall/bench_baseline.json
          python tests/recall/render_readme_quality.py \
            --bench-80   /tmp/bench/80.json \
            --bench-1000 /tmp/bench/1000.json \
            --bench-5000 /tmp/bench/5000.json \
            --readme README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/recall/bench_baseline.json README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(recall): refresh quality baseline + README from main"
          git push
