# Server-side secret scan for the brain repo.
#
# Install: copy this file to .github/workflows/secret-scan.yml inside the brain
# repo (e.g. <your-account>/private-brain-repo). It re-runs trufflehog +
# gitleaks against every push and PR, so a `git commit --no-verify` bypass is
# caught before merge.
#
# This is the second layer of defense. Pre-commit hook + sync-time scrubber
# are the first; this is what catches mistakes that sneak past them.
name: secret-scan

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so trufflehog can scan all commits

      - name: trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # The action has its own flag for verified-only; setting it here
          # so unverified hits also fail the build.
          # See: https://github.com/trufflesecurity/trufflehog#action
          extra_args: --results=verified,unknown,unverified

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only needed for org accounts; personal accounts
          # can skip. If you hit a license error, see:
          # https://gitleaks.io/products.html
